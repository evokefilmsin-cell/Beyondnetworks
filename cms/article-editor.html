<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>New Article | Beyond Networks CMS</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<script src="https://cdn.ckeditor.com/ckeditor5/41.4.2/classic/ckeditor.js"></script>
<!-- Dashboard CSS -->
<link rel="stylesheet" href="css/dashboard.css">

<!-- Editor CSS -->
<link rel="stylesheet" href="css/editor.css">

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="logo">
<img src="../images/logo.png">
</div>

<a href="dashboard.html">🏠 Dashboard</a>

<a href="articles.html">📰 Articles</a>

<a href="article-editor.html" class="active">✍ New Article</a>

<a href="videos.html">🎥 Videos</a>

<a href="media.html">🖼 Media Library</a>

<a href="categories.html">📂 Categories</a>

<a href="settings.html">⚙ Settings</a>

</div>

<!-- Main -->

<div class="main">

<form id="articleForm">

<!-- Top -->

<div class="editor-top">

<div>

<h1>Create New Article</h1>

<p>Write, optimize and publish your news article.</p>

</div>

<div class="editor-buttons">

<button type="button" class="btn btn-outline-light">
<i class="bi bi-eye"></i>
Preview
</button>

<button
type="button"
id="saveDraftBtn"
class="btn btn-outline-light">

Save Draft

</button>

<button
type="button"
id="publishBtn"
class="btn btn-danger">

Publish

</button>

</div>

</div>

<div class="editor-layout">

<!-- LEFT -->

<div class="editor-left">

<div class="card p-4">

<div class="mb-4">

<label class="form-label">
Article Title
</label>

<input
id="title"
type="text"
class="form-control"
placeholder="Enter article title">

</div>

<div class="mb-4">

<label class="form-label">
Short Description
</label>

<textarea
id="summary"
rows="3"
class="form-control"
placeholder="Write a short summary..."></textarea>

</div>

<div>

<label class="form-label">
Article Content
</label>

<textarea id="editor"></textarea>
  
</div>

</div>

</div>

<!-- RIGHT -->

<div class="editor-right">

<!-- Publish -->

<div class="card p-4 mb-4">

<h5>Publishing</h5>

<div class="d-grid gap-2 mt-3">

<button
type="button"
id="publishBtn2"
class="btn btn-danger">

<i class="bi bi-send"></i>

Publish Article

</button>

<button
type="button"
id="draftBtn2"
class="btn btn-outline-light">

Save Draft

</button>

</div>

</div>

<!-- Category -->

<div class="card p-4 mb-4">

<h5>Category</h5>

<select
id="category"
class="form-select mt-3">

<option>News</option>
<option>Politics</option>
<option>Business</option>
<option>Technology</option>
<option>Sports</option>
<option>Entertainment</option>

</select>

</div>

<!-- Featured Image -->

<div class="card p-4 mb-4">

<h5>Featured Image</h5>

<input
id="featuredImage"
type="file"
class="form-control mt-3">
  <div class="mt-3">
    <img
        id="imagePreview"
        src=""
        style="
            width:100%;
            max-height:220px;
            object-fit:cover;
            border-radius:10px;
            display:none;
        ">
</div>

</div>

<!-- Author -->

<div class="card p-4 mb-4">

<h5>Author</h5>

<input
id="author"
class="form-control mt-3"
placeholder="Author Name">

</div>

<!-- Tags -->

<div class="card p-4 mb-4">

<h5>Tags</h5>

<input
id="tags"
class="form-control mt-3"
placeholder="AI, Politics, India">

</div>

<!-- URL -->

<div class="card p-4 mb-4">

<h5>Article URL</h5>

<input
id="slug"
class="form-control mt-3"
placeholder="article-url">

</div>

<!-- Status -->

<div class="card p-4 mb-4">

<h5>Status</h5>

<select
id="status"
class="form-select mt-3">

<option>Draft</option>

<option selected>Published</option>

<option>Scheduled</option>

</select>

</div>

<!-- SEO -->

<div class="card p-4">

<h5>SEO</h5>

<input
id="seoTitle"
class="form-control mt-3 mb-3"
placeholder="SEO Title">

<textarea
id="metaDescription"
rows="4"
class="form-control"
placeholder="Meta Description"></textarea>

</div>

</div>

</div>

</form>

</div>

<!-- Supabase -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/editor.js"></script>

</body>
</html>
