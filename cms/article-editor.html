<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>New Article | Beyond Networks CMS</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<!-- TinyMCE -->
<script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/7/tinymce.min.js" referrerpolicy="origin"></script>

<!-- Dashboard CSS -->
<link rel="stylesheet" href="css/dashboard.css">

<!-- Editor CSS -->
<link rel="stylesheet" href="css/editor.css">

</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="../images/logo.png">
</div>

<a href="dashboard.html"><i class="bi bi-grid-fill"></i> Dashboard</a>

<a href="articles.html"><i class="bi bi-newspaper"></i> Articles</a>

<a href="article-editor.html" class="active"><i class="bi bi-pencil-square"></i> New Article</a>

<a href="videos.html"><i class="bi bi-camera-reels"></i> Videos</a>

<a href="media.html"><i class="bi bi-images"></i> Media Library</a>

<a href="categories.html"><i class="bi bi-folder2-open"></i> Categories</a>

<a href="settings.html"><i class="bi bi-gear-fill"></i> Settings</a>

</div>

<div class="main">

<div class="editor-top">

<div>

<h1>Create New Article</h1>

<p class="text-secondary">
Create and publish news articles.
</p>

</div>

<div class="editor-buttons">

<button class="btn btn-outline-light">
<i class="bi bi-save"></i>
Save Draft
</button>

<button class="btn btn-outline-light">
<i class="bi bi-eye"></i>
Preview
</button>

<button class="btn btn-danger">
<i class="bi bi-send"></i>
Publish
</button>

</div>

</div>

<div class="editor-layout">

<!-- LEFT -->

<div class="editor-left">

<div class="card bg-dark border-secondary p-4 mb-4">

<label class="form-label">Headline</label>

<input
type="text"
class="form-control mb-4"
placeholder="Enter article headline">

<label class="form-label">Slug</label>

<input
type="text"
class="form-control mb-4"
placeholder="article-url-slug">

<label class="form-label">Summary</label>

<textarea
class="form-control mb-4"
rows="4"
placeholder="Short summary..."></textarea>

<label class="form-label">Article Content</label>

<textarea id="editor"></textarea>

</div>

</div>

<!-- RIGHT -->

<div class="editor-right">

<div class="card bg-dark border-secondary p-4 mb-4">

<h5>Publishing</h5>

<label class="form-label mt-3">Status</label>

<select class="form-select">

<option>Draft</option>

<option>Published</option>

<option>Scheduled</option>

</select>

<label class="form-label mt-3">Brand</label>

<select class="form-select">

<option>Beyond News</option>

<option>Beyond Entertainment</option>

<option>Beyond Talks</option>

</select>

<label class="form-label mt-3">Category</label>

<select class="form-select">

<option>Politics</option>

<option>Business</option>

<option>Technology</option>

<option>Sports</option>

<option>Entertainment</option>

<option>International</option>

</select>

<label class="form-label mt-3">Author</label>

<input
type="text"
class="form-control"
placeholder="Author Name">

</div>

<div class="card bg-dark border-secondary p-4 mb-4">

<h5>Featured Image</h5>

<button class="btn btn-danger w-100 mt-3">

<i class="bi bi-upload"></i>

Upload Image

</button>

</div>

<div class="card bg-dark border-secondary p-4">

<h5>SEO</h5>

<label class="form-label mt-3">
SEO Title
</label>

<input
type="text"
class="form-control">

<label class="form-label mt-3">
Meta Description
</label>

<textarea
rows="5"
class="form-control"></textarea>

<label class="form-label mt-3">
Tags
</label>

<input
type="text"
class="form-control"
placeholder="news, politics, india">

</div>

</div>

</div>

</div>

<script>

tinymce.init({

selector:'#editor',

height:650,

branding:false,

menubar:true,

plugins:

'advlist autolink lists link image media table code fullscreen wordcount preview searchreplace autosave',

toolbar:

'undo redo | blocks | bold italic underline strikethrough | alignleft aligncenter alignright alignjustify | bullist numlist | link image media table | blockquote | code | fullscreen preview',

placeholder:'Start writing your story...'

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
