
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Beyond Networks CMS</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <img src="../images/logo.png" class="cms-logo">

        <h1>Beyond Networks CMS</h1>

        <p>Sign in to continue</p>

        <form>

            <input
                type="email"
                placeholder="Email Address"
            >

            <input
                type="password"
                placeholder="Password"
            >

            <button>

                Login

            </button>

        </form>

    </div>

</div>

</body>

</html>
