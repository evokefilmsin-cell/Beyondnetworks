<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Articles | Beyond Networks CMS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="css/dashboard.css">

</head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/articles.js"></script>
<body>

<div class="sidebar">

<div class="logo">
<img src="../images/logo.png">
</div>

<a href="dashboard.html"><i class="bi bi-grid-fill"></i> Dashboard</a>

<a href="articles.html" class="active"><i class="bi bi-newspaper"></i> Articles</a>

<a href="article-editor.html"><i class="bi bi-pencil-square"></i> New Article</a>

<a href="videos.html"><i class="bi bi-camera-reels"></i> Videos</a>

<a href="media.html"><i class="bi bi-images"></i> Media Library</a>

<a href="categories.html"><i class="bi bi-folder2-open"></i> Categories</a>

<a href="settings.html"><i class="bi bi-gear-fill"></i> Settings</a>

</div>

<div class="main">

<div class="d-flex justify-content-between align-items-center mb-4">

<div>

<h1>Articles</h1>

<p class="text-secondary">Manage all published and draft articles</p>

</div>

<a href="article-editor.html" class="btn btn-danger btn-lg">

<i class="bi bi-plus-circle"></i>

New Article

</a>

</div>

<div class="card bg-dark border-secondary mb-4">

<div class="card-body">

<div class="row g-3">

<div class="col-md-4">
<input class="form-control bg-black text-white border-secondary"
placeholder="Search articles...">
</div>

<div class="col-md-2">

<select class="form-select bg-black text-white border-secondary">

<option>All Brands</option>

<option>Beyond News</option>

<option>Beyond Entertainment</option>

<option>Beyond Talks</option>

</select>

</div>

<div class="col-md-2">

<select class="form-select bg-black text-white border-secondary">

<option>Category</option>

<option>Politics</option>

<option>Business</option>

<option>Technology</option>

<option>Entertainment</option>

</select>

</div>

<div class="col-md-2">

<select class="form-select bg-black text-white border-secondary">

<option>Status</option>

<option>Published</option>

<option>Draft</option>

<option>Scheduled</option>

</select>

</div>

<div class="col-md-2">

<button class="btn btn-outline-light w-100">

Filter

</button>

</div>

</div>

</div>

</div>

<div class="card bg-dark border-secondary">

<div class="table-responsive">

<table class="table table-dark table-hover align-middle mb-0">

<thead>

<tr>

<th></th>

<th>Thumbnail</th>

<th>Headline</th>

<th>Brand</th>

<th>Category</th>

<th>Date</th>

<th>Status</th>

<th>Actions</th>

</tr>

</thead>

<tbody>

<tr>

<td><input type="checkbox"></td>

<td><img src="../images/logo.png" width="60"></td>

<td>India Signs New Trade Agreement</td>

<td>Beyond News</td>
<tbody id="articlesTable">

</tbody>

</table>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
